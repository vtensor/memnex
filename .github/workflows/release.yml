name: release

# Triggers on a version tag push (e.g. `git tag v0.1.0 && git push --tags`).
# Builds the wheel + sdist and uploads to PyPI via trusted publishing —
# no long-lived API token in the repo.
#
# One-time setup before this workflow can run:
# 1. Sign in to https://pypi.org/manage/account/publishing/
# 2. Click "Add a new pending publisher"
# 3. Fill in:
#      PyPI project name:   memnex
#      Owner:               <your-github-username-or-org>
#      Repository name:     <your-repo-name>
#      Workflow name:       release.yml
#      Environment name:    pypi
# 4. After the first successful publish, the publisher becomes "active".
#
# To cut a release after that:
#   * bump version in pyproject.toml
#   * move CHANGELOG entries from [Unreleased] to [X.Y.Z]
#   * commit, push
#   * git tag vX.Y.Z && git push --tags
# This workflow then builds and uploads automatically.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate metadata
        run: twine check dist/*

      - name: Upload built artefacts as job output
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The "pypi" environment must exist in your repo settings; trusted
    # publishing on PyPI is bound to (repo, workflow, environment).
    environment:
      name: pypi
      url: https://pypi.org/p/memnex
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - name: Download built artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
